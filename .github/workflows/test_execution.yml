name: Automated Hybrid Test Suite

# 1. THE TRIGGER: When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # This magical line adds a "Run Workflow" button in the GitHub UI so you can trigger it manually!

# 2. THE ENVIRONMENT: What operating system are we using?
jobs:
  test-execution:
    runs-on: ubuntu-latest

    # 3. THE STEPS: The chronological recipe
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps

    - name: Inject Authentication State
      env:
        AUTH_JSON: ${{ secrets.AUTH_JSON_DATA }}
      # This command creates a new auth.json file in the cloud and pastes your secret inside it!
      run: echo "$AUTH_JSON" > auth.json

    - name: Run Pytest Test Suite
      # We map your GitHub Secrets to the environment variables your code expects
      env: 
        GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
        GITHUB_PASSWORD: ${{ secrets.GH_PASSWORD }}
        GITHUB_PAT: ${{ secrets.GH__TOKEN }}
      run: pytest -v -s --screenshot=only-on-failure

    # This new step tells GitHub to save the screenshot so you can download it!
    - name: Upload Test Results
      if: always() # This ensures the upload happens even if the test fails
      uses: actions/upload-artifact@v4
      with:
        name: playwright-failure-screenshots
        path: test-results/