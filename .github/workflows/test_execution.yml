name: Automated Hybrid Test Suite

# 1. THE TRIGGER: When should this run?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # This magical line adds a "Run Workflow" button in the GitHub UI so you can trigger it manually!

# 2. THE ENVIRONMENT: What operating system are we using?
jobs:
  test-execution:
    runs-on: ubuntu-latest

    # 3. THE STEPS: The chronological recipe
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install chromium --with-deps

    - name: Run Pytest Test Suite
      # We map your GitHub Secrets to the environment variables your code expects
      env: 
        GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
        GITHUB_PASSWORD: ${{ secrets.GH_PASSWORD }}
        GITHUB_PAT: ${{ secrets.GH_TOKEN }}
      run: pytest -v -s